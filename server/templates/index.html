<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saldırı Tespit Paneli</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0d1117;
    color:#c9d1d9;
    font-family:Segoe UI,sans-serif;
    margin:0;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #30363d;
    padding-bottom:15px;
}

.stats-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:25px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:10px;
    padding:20px;
    text-align:center;
}

.card h3{
    margin:0;
    color:#8b949e;
    font-size:14px;
}

.card p{
    margin-top:10px;
    font-size:24px;
    font-weight:bold;
}

.chart-section{
    margin-top:30px;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:10px;
    padding:20px;
}

.chart-container{
    height:350px;
}

.status-safe{
    color:#3fb950;
}

.status-attack{
    color:#f85149;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:.5;}
    100%{opacity:1;}
}

/* Zaman Filtre Alanı */
.filter-container {
    display: flex;
    gap: 15px;
    align-items: center;
    margin-bottom: 20px;
    background: #0d1117;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #30363d;
    flex-wrap: wrap;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

.filter-container label {
    font-size: 14px;
    color: #8b949e;
    font-weight: 600;
}

.filter-container input[type="date"],
.filter-container input[type="time"] {
    background: #161b22;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 8px;
    border-radius: 6px;
    outline: none;
}

.filter-btn {
    background: #238636;
    color: #ffffff;
    border: 1px solid rgba(240,246,252,0.1);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}

.filter-btn:hover {
    background: #2ea44f;
}

/* Tablo Yapısı */
.history-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    text-align: left;
}

.history-table th, .history-table td {
    padding: 12px;
    border-bottom: 1px solid #30363d;
}

.history-table th {
    background-color: #0d1117;
    color: #8b949e;
    font-size: 14px;
}

.history-table tr:hover {
    background-color: #1f242c;
}
</style>
</head>
<body>

<div class="header">
    <h2>🛡️ Saldırı Tespit Paneli</h2>
    <div>● Sistem Aktif</div>
</div>

<div class="stats-container">
    <div class="card">
        <h3>Toplam İstek</h3>
        <p id="total-logs">0</p>
    </div>
    <div class="card">
        <h3>Kaynak IP Sayısı</h3>
        <p id="unique-ips">0</p>
    </div>
    <div class="card">
        <h3>Engellenen IP</h3>
        <p id="blocked-ips">0</p>
    </div>
    <div class="card">
        <h3>En Aktif IP</h3>
        <p id="top-ip">-</p>
    </div>
    <div class="card">
        <h3>Güvenlik Durumu</h3>
        <p id="status-text" class="status-safe">Güvenli</p>
    </div>
</div>

<div class="chart-section">
    <h3>Canlı Trafik</h3>
    <div class="chart-container">
        <canvas id="trafficChart"></canvas>
    </div>
</div>

<div class="chart-section">
    <h3>Saldırı Geçmişi</h3>
    
    <div class="filter-container">
        <div class="filter-group">
            <label>Başlangıç:</label>
            <input type="date" id="start-date">
            <input type="time" id="start-time" value="00:00">
        </div>
        
        <div class="filter-group">
            <label>Bitiş:</label>
            <input type="date" id="end-date">
            <input type="time" id="end-time" value="23:59">
        </div>
        
        <button class="filter-btn" id="btn-filter">Filtrele</button>
        <button class="filter-btn" style="background:#30363d;" id="btn-clear">Temizle</button>
    </div>

    <table class="history-table">
        <thead>
            <tr>
                <th>Tarih / Saat</th>
                <th>Saldırı Türü</th>
                <th>Saldırgan IP</th>
                <th>İstek Hızı (Rate)</th>
                <th>Tekil IP Sayısı</th>
            </tr>
        </thead>
        <tbody id="attack-history-body"></tbody>
    </table>
</div>

<script>
const ctx = document.getElementById("trafficChart").getContext("2d");
let isFiltered = false;

const trafficChart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Son 120 Saniyedeki Trafik",
            data: [],
            borderColor: "#58a6ff",
            backgroundColor: "rgba(88,166,255,0.1)",
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// Otomatik tarih set etme
const todayStr = new Date().toISOString().split('T')[0];
document.getElementById("start-date").value = todayStr;
document.getElementById("end-date").value = todayStr;

async function fetchHistory() {
    const startDate = document.getElementById("start-date").value;
    const startTime = document.getElementById("start-time").value;
    const endDate = document.getElementById("end-date").value;
    const endTime = document.getElementById("end-time").value;

    let url = "/history";
    
    // ISO standardına tam uymak ve URL encode sorunlarını önlemek için 'T' formatı kullanıldı
    if (startDate || endDate) {
        const startFull = startDate ? `${startDate}T${startTime}:00` : "";
        const endFull = endDate ? `${endDate}T${endTime}:59` : "";
        url += `?start=${encodeURIComponent(startFull)}&end=${encodeURIComponent(endFull)}`;
    }

    try {
        const history = await fetch(url).then(r => r.json());
        const tableBody = document.getElementById("attack-history-body");
        tableBody.innerHTML = "";

        if (history.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#8b949e;">Seçilen zaman aralığında kayıt bulunamadı.</td></tr>`;
            return;
        }

        history.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.time}</td>
                <td style="color:#f85149; font-weight:bold;">${item.type}</td>
                <td>${item.ip}</td>
                <td>${item.rate}/s</td>
                <td>${item.unique_ips}</td>
            `;
            tableBody.appendChild(tr);
        });
    } catch(err) {
        console.error("Geçmiş yüklenirken hata:", err);
    }
}

document.getElementById("btn-filter").addEventListener("click", () => {
    isFiltered = true; 
    fetchHistory();
});

document.getElementById("btn-clear").addEventListener("click", () => {
    document.getElementById("start-date").value = todayStr;
    document.getElementById("start-time").value = "00:00";
    document.getElementById("end-date").value = todayStr;
    document.getElementById("end-time").value = "23:59";
    isFiltered = false; 
    fetchHistory();
});

async function refresh() {
    try {
        const stats = await fetch("/stats").then(r => r.json());
        const detect = await fetch("/detect").then(r => r.json());
        
        if (!isFiltered) {
            fetchHistory();
        }

        document.getElementById("total-logs").innerText = stats.total_logs;
        document.getElementById("unique-ips").innerText = stats.unique_ips;
        document.getElementById("blocked-ips").innerText = stats.blocked_ips;
        document.getElementById("top-ip").innerText = stats.top_ip ? `${stats.top_ip[0]} (${stats.top_ip[1]})` : "-";

        const statusText = document.getElementById("status-text");
        if (detect.attack) {
            const attackTypes = Array.isArray(detect.types) ? detect.types.join(", ") : (detect.types || "Saldırı");
            statusText.innerText = "TEHLİKE: " + attackTypes;
            statusText.className = "status-attack";
            trafficChart.data.datasets[0].borderColor = "#f85149";
        } else {
            statusText.innerText = "Güvenli";
            statusText.className = "status-safe";
            trafficChart.data.datasets[0].borderColor = "#58a6ff";
        }

        const now = new Date().toLocaleTimeString();
        trafficChart.data.labels.push(now);
        trafficChart.data.datasets[0].data.push(stats.recent_logs);

        if (trafficChart.data.labels.length > 15) {
            trafficChart.data.labels.shift();
            trafficChart.data.datasets[0].data.shift();
        }
        trafficChart.update();

    } catch (err) {
        console.error("Veri çekme hatası:", err);
    }
}

fetchHistory();
setInterval(refresh, 2000);
</script>
</body>
</html>
