<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IDS Dashboard | Proje</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0; color: #8b949e; font-size: 14px; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .chart-section { margin-top: 30px; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; height: 350px; }
        .status-safe { color: #3fb950; }
        .status-attack { color: #f85149; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h2>🛡️ Saldırı Tespit Paneli</h2>
    <div id="connection">● Sistem Aktif</div>
</div>

<div class="stats-container">
    <div class="card">
        <h3>Toplam İstek</h3>
        <p id="total-logs">0</p>
    </div>
    <div class="card">
        <h3>Kaynak IP Sayısı</h3>
        <p id="unique-ips">0</p>
    </div>
    <div class="card" id="status-card">
        <h3>Güvenlik Durumu</h3>
        <p id="status-text" class="status-safe">Normal</p>
    </div>
</div>

<div class="chart-section">
    <canvas id="trafficChart"></canvas>
</div>

<script>
    const ctx = document.getElementById('trafficChart').getContext('2d');
    const trafficChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Saniye Başına Trafik',
                data: [],
                borderColor: '#58a6ff',
                backgroundColor: 'rgba(88, 166, 255, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    async function refresh() {
        try {
            // Verileri Flask endpointlerinden çekiyoruz
            const stats = await fetch('/stats').then(r => r.json());
            const detect = await fetch('/detect').then(r => r.json());

            document.getElementById('total-logs').innerText = stats.total_logs;
            document.getElementById('unique-ips').innerText = stats.unique_ips;

            const statusText = document.getElementById('status-text');
            if(detect.attack) {
                statusText.innerText = "TEHLİKE: " + detect.types.join(", ");
                statusText.className = "status-attack";
                trafficChart.data.datasets[0].borderColor = '#f85149';
            } else {
                statusText.innerText = "Güvenli";
                statusText.className = "status-safe";
                trafficChart.data.datasets[0].borderColor = '#58a6ff';
            }

            // Grafiği güncelle
            const now = new Date().toLocaleTimeString();
            trafficChart.data.labels.push(now);
            trafficChart.data.datasets[0].data.push(stats.recent_logs);
            if(trafficChart.data.labels.length > 15) {
                trafficChart.data.labels.shift();
                trafficChart.data.datasets[0].data.shift();
            }
            trafficChart.update();

        } catch (e) { console.error("Bağlantı hatası:", e); }
    }

    setInterval(refresh, 2000); // 2 saniyede bir güncelle
</script>
</body>
</html>
